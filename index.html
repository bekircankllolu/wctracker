<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#f6f4ef" />
    <title>WC Tracker 🚽</title>

    <!-- PWA: ana ekrana ekle + çevrimdışı kabuk -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="WC Tracker" />

    <!-- Tema tercihini boyamadan önce uygula (FOUC önler). -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem("wc-theme") || "system";
          var dark = t === "dark" || (t === "system" && matchMedia("(prefers-color-scheme: dark)").matches);
          document.documentElement.dataset.theme = dark ? "dark" : "light";
          var m = document.querySelector('meta[name="theme-color"]');
          if (m) m.setAttribute("content", dark ? "#171613" : "#f6f4ef");
        } catch (e) {}
      })();
    </script>

    <!-- Fontu erken keşfet: preconnect + doğrudan stylesheet linki
         (CSS içindeki @import geç indiriliyordu, metin gecikmeli görünüyordu). -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
